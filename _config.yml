###########################
# --- General options --- #
###########################

# Select which social network share links to show in posts
share-links-active:
  twitter: false
  facebook: false
  linkedin: false
  vk: false
  reddit: false

# How to display the link to your website in the footer
# Remove this if you don't want a link in the footer
url-pretty: "hoefner-online.de"

# Add the website title to the title of every page
title-on-all-pages: true

# Excerpt word length - Truncate the excerpt of each post on the feed page to the specified number of words
excerpt_length: 50

# Whether or not to show an excerpt for every blog post in the feed page
feed_show_excerpt: true

# Whether or not to show a list of tags below each post preview in the feed page
feed_show_tags: true

# Add a search button to the navbar
post_search: false

# Add a button in the footer to edit the current page. Only works if your website is hosted on GitHub
edit_page_button: true

# Allow sub-menu items (second-level navigation menu items) to be longer than the top-level menu
# If this setting is off, then long sub-menu words might get cut off
# See https://github.com/daattali/beautiful-jekyll/issues/765 to understand the issue this setting can solve
navbar-var-length: false

######################################
# --- Colours / background image --- #
######################################
# Paste these lines into _config.yml at the top level

# Page & text
page-col: "#FFFFFF"          # white page background
text-col: "#222222"          # near-black body text

# Links & headings
link-col: "#2c5f8a"          # steel blue — links and heading accents
hover-col: "#1e4466"         # darker navy on hover

# Navbar (top bar)
navbar-col: "#2c5f8a"        # steel blue navbar background
navbar-text-col: "#FFFFFF"   # white text on navbar
navbar-border-col: "#1e4466" # darker navy border under navbar

# Footer
footer-col: "#2c5f8a"        # steel blue footer, matching navbar
footer-text-col: "#b8d4ee"   # pale blue-grey footer text
footer-link-col: "#FFFFFF"   # white footer links
footer-hover-col: "#d0e8f8"  # very light blue hover in footer


#################################
# --- Web Analytics Section --- #
#################################

# Fill in your Google Analytics tag ID (or "Measurement ID") to track your website usage
#gtag: "G-XXXXXXXXXX"

# Fill in your Cloudflare Analytics beacon token to track your website using Cloudflare Analytics
#cloudflare_analytics: ""

# Google Tag Manager ID
#gtm: ""

# Matomo (aka Piwik) Web statistics
# Uncomment the following section to enable Matomo. The opt-out parameter controls
# whether or not you want to allow users to opt out of tracking.
#matomo:
#  site_id: "9"
#  uri: "demo.wiki.pro"
#  opt-out: true

# Google Universal Analytics ID -- deprecated
# As of July 2023 this is no longer supported by Google! If you are still using `google_analytics`,
# you should switch to using the `gtag` field above instead.
#google_analytics: "UA-XXXXXXXX-X"



################
# --- Misc --- #
################

# Ruby Date Format to show dates of posts
date_format: "%B %-d, %Y"


#################################################################################
# --- You don't need to touch anything below here (but you can if you want) --- #
#################################################################################

# Output options (more information on Jekyll's site)
timezone: "Australia/Canberra"
markdown: kramdown
highlighter: rouge
permalink: /:year-:month-:day-:title/
# paginate: 5

kramdown:
  input: GFM

# Default YAML values (more information on Jekyll's site)
defaults:
  -
    scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      comments: true  # add comments to all blog posts
      social-share: true # add social media sharing buttons to all blog posts
  -
    scope:
      path: "" # any file that's not a post will be a "page" layout by default
    values:
      layout: "page"

collections:
    publications:
        output: true
        permalink: /publications/:name
    teaching:
        output: false        # individual pages not needed; overview page handles display
    people:
        output: false   # individual pages not needed; overview handles display
    
# Exclude these files from production site
exclude:
  - CHANGELOG.md
  - CNAME
  - Gemfile
  - Gemfile.lock
  - LICENSE
  - README.md
  - screenshot.png
  - docs/
  - assets/data/searchcorpus.json

plugins:
  - jekyll-paginate
  - jekyll-sitemap

